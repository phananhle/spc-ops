id: pipe-diameter-drift-demo
title: Pipe extrusion diameter drift
summary: >-
  A pipe extrusion line has started producing parts near the upper diameter
  limit after a resin lot change and cooling adjustment.
problemStatement: >-
  Pipe diameter is drifting. Identify key sensors that can connect to
  upstream root causes using the manufacturing logs.
line: Extrusion Line 2
product: HDPE irrigation pipe, 40 mm nominal diameter
seed: 20260507
n_samples: 24
start_time: "08:00"
interval_minutes: 5

objectives:
  - Identify which sensor stream first shows abnormal behavior.
  - Describe whether the pattern looks like common-cause variation, a shift, or a trend.
  - Connect the chart evidence to a plausible manufacturing root cause.

sensors:
  - key: diameter
    label: Outer Diameter
    unit: mm
    description: Pipe outer diameter measured after the cooling bath.
    baseline: { mean: 40.00, sigma: 0.025 }
    pattern: { type: trend, start: 17, slope: 0.035 }

  - key: pressure
    label: Melt Pressure
    unit: bar
    description: Extruder melt pressure before the die head.
    baseline: { mean: 119.0, sigma: 0.7 }
    pattern: { type: trend, start: 18, slope: 0.55 }

  - key: temperature
    label: Cooling Bath Temp
    unit: C
    description: Average cooling bath temperature near the sizing sleeve.
    baseline: { mean: 20.1, sigma: 0.18 }
    pattern: { type: trend, start: 16, slope: 0.18 }

  - key: wallThickness
    label: Wall Thickness
    unit: mm
    description: Ultrasonic wall thickness measurement after puller station.
    baseline: { mean: 3.00, sigma: 0.012 }
    pattern: { type: stable }

logs:
  - time: "08:10"
    source: Material handling
    message: Operator loaded resin lot B-447 after lot A-312 ran out.
  - time: "08:35"
    source: Line operator
    message: Cooling bath valve adjusted to reduce visible pipe ovality.
  - time: "09:05"
    source: Quality check
    message: Diameter readings are still in spec, but trending high.
  - time: "09:40"
    source: Maintenance
    message: No puller speed alarms. Vacuum sizing pump sounds normal.

groundTruth:
  anomalyType: Western Electric trend / sustained upward drift
  rootCause: Cooling bath temperature increased after adjustment, causing pipe diameter growth.
  teachingFocus:
    - Compare related sensors instead of judging one chart in isolation.
    - Notice the trend before points cross the control limit.
    - Use logs as evidence, not as a replacement for chart interpretation.

# Resource bank for the Socratic tutor. Each rung has three disclosure levels;
# the tutor selects what fits the learner's current stage and prior moves
# (it does NOT march through them in order). See src/services/socraticPrompt.ts.
tutorPlan:
  - concept: Compare related sensors before judging one chart in isolation
    nudge: >-
      You are looking at diameter. Are any of the other sensor charts also
      showing unusual behavior in the same time window?
    hint: >-
      Look at the cooling bath temperature chart around the same samples where
      diameter starts trending up. What do you notice about which one moves first?
    reveal: >-
      Cooling bath temperature drifts up starting around sample 16; diameter
      only starts at sample 17. The earliest abnormal signal is upstream of
      the QA metric.

  - concept: Notice a trend before points cross the control limit
    nudge: >-
      Are the diameter readings still inside the control limits? What does the
      direction of the recent points tell you on its own?
    hint: >-
      Western Electric run rules let you flag a process change before any
      single point breaks UCL. Which rule fits a sustained one-direction drift?
    reveal: >-
      A run of consecutive points trending in one direction (Western Electric
      trend rule) indicates a sustained shift even when each point is
      technically still in spec.

  - concept: Use the operator log as evidence, not a replacement for the chart
    nudge: >-
      Anything in the operator logs around the time the drift starts that
      might be relevant?
    hint: >-
      Two operator actions are logged before sample 17. Which timestamp lines
      up with the cooling bath chart starting to move?
    reveal: >-
      The 08:35 cooling bath valve adjustment lines up with the bath
      temperature drift starting at sample 16 — the log corroborates what the
      chart is showing.

# Curated catalog of common SPC misdiagnoses for this scenario. When the
# learner's response contains a triggerCue, the tutor targets the
# correctiveHint instead of inventing an ad-hoc reply.
misconceptions:
  - id: blame-resin-lot
    label: Blames the resin lot change automatically because it is the most dramatic log entry
    triggerCues:
      - resin
      - lot
      - b-447
      - a-312
      - material change
      - material lot
    correctiveHint: >-
      The resin lot changed at 08:10. If that were the cause, what would you
      expect to see in melt pressure starting near sample 10? Compare what is
      actually in the data with what your hypothesis predicts.

  - id: blame-equipment
    label: Blames mechanical equipment despite logs explicitly noting normal operation
    triggerCues:
      - puller
      - vacuum
      - sizing pump
      - die head
      - pump
      - extruder broken
    correctiveHint: >-
      The 09:40 maintenance log notes the puller and vacuum sizing pump as
      normal. If you suspect equipment, what additional evidence would
      override that operator observation?

  - id: treats-stable-as-anomaly
    label: Treats a stable distractor sensor (wall thickness) as if it were anomalous
    triggerCues:
      - wall thickness
    correctiveHint: >-
      Look at the wall thickness data — are any points outside control limits
      or trending? What does its stability tell you about which sensors are
      actually showing the anomaly?

  - id: jumps-to-mean-shift
    label: Calls the pattern a sudden mean shift without examining the run length
    triggerCues:
      - mean shift
      - sudden shift
      - step change
      - jump
    correctiveHint: >-
      Look at the diameter points one by one starting around sample 16. Is
      this a sudden jump from one mean to another, or a steady drift across
      many samples? What rule would you cite?
